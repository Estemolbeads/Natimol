    <main>
     <!-- Contact Page -->
        <section id="contact" class="page">
            <h2>Get In Touch</h2>
            <p style="text-align: center; margin-bottom: 2rem;">We'd love to hear from you. Reach out to place orders or for any inquiries.</p>
           
            <div class="contact-container">
                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <div class="contact-details">
                        <p><i class="fas fa-map-marker-alt"></i>Dansoman, Alijara</p>
                        <p><i class="fas fa-phone"></i> (233)24 646 8649</p>
                        <p><i class="fas fa-envelope"></i> info@estemolbeads.com</p>
                        <p><i class="fas fa-clock"></i> Mon-Sat: 10am-8pm, Sun: 11am-6pm</p>
                    </div>
                   
                    <h3>Follow Us</h3>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
               
                <div class="contact-form">
                    <h3>Send Us a Message</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="message">Your Message</label>
                            <textarea id="message" class="form-control" required></textarea>
                        </div>
                        <button type="submit" class="btn">Send Message</button>
                    </form>
                </div>
            </div>
           
            <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3971.1635376272357!2d-0.2591174260307997!3d5.542753033784876!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdfbdbbaf1ca479%3A0x474e8c4d01150ff2!2sEstemolbeads!5e0!3m2!1sen!2sgh!4v1775111660053!5m2!1sen!2sgh" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>   
            </div>
